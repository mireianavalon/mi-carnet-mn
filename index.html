<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi UPV - Carnet</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --upv-red: #E43E33;
            --bg-gray: #f5f5f5;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--bg-gray);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Header */
        .header {
            background: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }
        /* Tarjeta */
        .card-container {
            padding: 20px;
            flex-grow: 1;
        }
        .carnet {
            background-color: var(--upv-red);
            border-radius: 15px;
            padding: 20px;
            color: white;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-height: 200px;
        }
        .profile-pic {
            width: 100px;
            height: 120px;
            background: #eee;
            border: 2px solid white;
            float: left;
            margin-right: 15px;
        }
        .user-info {
            font-size: 0.9em;
        }
        .user-info h2 {
            margin: 0;
            font-size: 1.1em;
            text-transform: uppercase;
        }
        /* Sección Código de Barras */
        .barcode-section {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
        }
        #barcode { width: 100%; }
        
        /* Navegación inferior */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background: white;
            padding: 10px 0;
            border-top: 1px solid #ddd;
        }
        .nav-item { color: #888; font-size: 0.7em; text-align: center; }
        .nav-item.active { color: var(--upv-red); }
    </style>
</head>
<body>

    <div class="header">MiUPV</div>

    <div class="card-container">
        <div class="carnet">
            <img src="foto.jpg" alt="Foto" class="profile-pic">
            <div class="user-info">
                <h2 id="userName">NAVALÓN FERNÁNDEZ, MIREIA</h2>
                <p id="userRole">Estudiante</p>
            </div>
            <div style="position:absolute; bottom:20px; right:20px; font-size:2em; font-weight:bold; opacity:0.5;">UPV</div>
        </div>

        <div class="barcode-section" onclick="generateBarcode()">
            <div style="color: var(--upv-red); margin-bottom: 10px;">Codi de barres</div>
            <svg id="barcode"></svg>
            <p style="font-size: 0.8em; color: #555;">Toca para actualizar/generar</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">Avisos</div>
        <div class="nav-item">Calendari</div>
        <div class="nav-item active">Carnet</div>
        <div class="nav-item">Serveis</div>
    </div>

    <script>
        function generateBarcode() {
            // Aquí pones el número de tu carnet que aparece en la tarjeta física
            JsBarcode("#barcode", "5901000423792729", {
                format: "CODE128",
                lineColor: "#000",
                width: 2,
                height: 80,
                displayValue: true
            });
        }
        // Generar automáticamente al cargar
        window.onload = generateBarcode;
    </script>
</body>

</html>
