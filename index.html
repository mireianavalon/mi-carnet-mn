<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi UPV - Mireia</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --upv-red: #E43E33; --bg: #f5f5f5; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        header h1 { font-size: 18px; margin: 0; flex-grow: 1; text-align: center; }

        /* Contenedores de Pestañas */
        .tab-content { display: none; padding: 15px; flex-grow: 1; overflow-y: auto; }
        .tab-content.active { display: block; }

        /* CARNET UPV INTERACTIVO */
        .flip-card { width: 100%; height: 215px; perspective: 1000px; margin-top: 10px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.active .flip-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        
        /* Cara Delantera */
        .card-front { background: var(--upv-red); color: white; padding: 20px; box-sizing: border-box; }
        .profile-pic { width: 95px; height: 125px; background: #eee; border: 2px solid white; float: left; margin-right: 15px; object-fit: cover; }
        .user-data h2 { margin: 0; font-size: 17px; line-height: 1.2; text-transform: uppercase; }
        .card-logo { position: absolute; bottom: 10px; right: 20px; font-size: 80px; font-weight: 800; opacity: 0.15; }

        /* Cara Trasera - Corregido color y visibilidad */
        .card-back { background: #2c3e50; color: white; transform: rotateY(180deg); padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
        .back-info div { margin-bottom: 15px; border-left: 4px solid var(--upv-red); padding-left: 15px; }
        .back-info label { display: block; font-size: 11px; color: #bdc3c7; text-transform: uppercase; font-weight: bold; }
        .back-info span { font-size: 18px; font-weight: bold; color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* SECCIONES COMPLEMENTARIAS */
        .barcode-section { background: white; border-radius: 15px; padding: 20px; text-align: center; margin-top: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .calendar-grid { background: white; border-radius: 15px; padding: 15px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .today { background: var(--upv-red); color: white; border-radius: 50%; width: 30px; height: 30px; line-height: 30px; margin: 0 auto; }
        .item-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }

        /* NAV INFERIOR */
        .nav-bar { background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; flex-shrink: 0; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--upv-red); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }

        /* FULLSCREEN BARCODE */
        #fullview { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #fullview svg { transform: rotate(90deg); width: 80vh; }
    </style>
</head>
<body>

<header>
    <h1>MiUPV</h1>
